services:
  floci:
    image: floci/floci:latest
    container_name: patientor-floci
    ports:
      - "127.0.0.1:4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - floci-data:/app/data
    environment:
      FLOCI_HOSTNAME: localhost
      FLOCI_STORAGE_MODE: persistent
      FLOCI_STORAGE_PERSISTENT_PATH: /app/data
      FLOCI_SERVICES_DOCKER_NETWORK: patientor-server_default
      FLOCI_SERVICES_ECS_DOCKER_NETWORK: patientor-server_default
      FLOCI_SERVICES_ECR_DOCKER_NETWORK: patientor-server_default
      FLOCI_SERVICES_ECR_URI_STYLE: path

  postgres:
    image: postgres:16-alpine
    container_name: patientor-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: patientor
      POSTGRES_PASSWORD: patientor
      POSTGRES_DB: patientor
    volumes:
      - patientor-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patientor -d patientor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  floci-data:
  patientor-postgres-data:
