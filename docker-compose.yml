services:
  localstack:
    image: localstack/localstack:latest
    container_name: patientor-localstack
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    environment:
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
      PERSISTENCE: ${LOCALSTACK_PERSISTENCE:-0}
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:16-alpine
    container_name: patientor-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: patientor
      POSTGRES_PASSWORD: patientor
      POSTGRES_DB: patientor
    volumes:
      - patientor-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patientor -d patientor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  localstack-data:
  patientor-postgres-data:
