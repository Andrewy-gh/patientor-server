packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@emotion/react": ^11.14.0
  "@emotion/styled": ^11.14.1
  "@mui/icons-material": ^5.18.0
  "@mui/material": ^5.18.0
  "@oxlint/plugins": 1.66.0
  "@types/node": ^24
  "@types/react": ^18.3.27
  "@types/react-dom": ^18.3.7
  "@vitejs/plugin-react": ^5.1.1
  axios: ^1.13.2
  react: ^18.3.1
  react-dom: ^18.3.1
  react-router-dom: ^6.30.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
